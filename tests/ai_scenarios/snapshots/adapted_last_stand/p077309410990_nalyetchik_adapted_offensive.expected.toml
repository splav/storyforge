# Adapted last-stand: Зверокров Налётчик r=1, hp=1/8 (12%) — критический HP.
# Несмотря на high self_preserve (0.95) AI выбирает MoveAndCast melee_attack.
#
# Anti-pin к twisted_grove/p013_iskazhenny_last_stand_trade (тот же
# критический HP → ProtectSelf Move). Различие: у Искажённого зверя есть
# defensive options (taunt/escape geometry); у Налётчика — нет.
#
# Pipeline: ProtectSelfStage пытается активировать ProtectSelf intent;
# AdaptationStage детектирует `protect_self_no_defensive` (нет taunt/heal
# среди viable plans) и адаптирует обратно в offensive. Результат —
# last-stand commit.
#
# intent_reason.kind = "adapted", prior = "panic_override",
# reason = "protect_self_no_defensive".
#
# Этот pin защищает от over-tuning self_preserve floor'а: если поднять
# threshold так, что Налётчик начнёт ретироваться без defensive options,
# AI будет пассивно умирать вместо того, чтобы хотя бы попытаться нанести
# урон перед смертью.
#
# Source: rebuilt из v29 logs 27 апр 2026 (beastblood_raid playtest).

[scope]
plan_id = 77309410990

[[expectations]]
decision_kind = ["MoveAndCast", "CastInPlace"]
cast_ability = ["melee_attack"]
primary_effect = ["Damage"]
