# Adapted last-stand: Зверокров Искажённый зверь r=2, hp=1/12 (8%) — критический HP.
# Несмотря на high self_preserve AI выбирает MoveAndCast melee_attack.
#
# Anti-pin к twisted_grove/p013 (который был удалён). Различие: у Искажённого
# зверя в этом snapshot есть только melee_attack — нет taunt/heal/defensive options.
# Pipeline: ProtectSelfStage пытается активировать ProtectSelf intent;
# AdaptationStage детектирует protect_self_no_defensive и адаптирует
# обратно в offensive. Результат — last-stand commit.
#
# intent_reason.kind = "adapted", prior = "panic_override".
#
# Этот pin защищает от over-tuning self_preserve floor'а: если поднять
# threshold так что Искажённый начнёт ретироваться без defensive options,
# AI будет пассивно умирать вместо попытки нанести урон перед смертью.
#
# Source: twisted_grove playtest 2026-04-28 (v30), round=2, actor=25769803436.
# Log slice: only the r=2 adapted entry is included (from the same playtest).

[scope]
plan_id = 25769803436

[[expectations]]
decision_kind = ["MoveAndCast", "CastInPlace"]
cast_ability = ["melee_attack"]
primary_effect = ["Damage"]
