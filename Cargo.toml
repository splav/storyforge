[package]
name = "storyforge"
version = "0.1.0"
edition = "2021"

[dependencies]
bevy  = "0.18"
hexx  = { version = "0.24", features = ["bevy", "algorithms"] }
serde = { version = "1", features = ["derive"] }
toml  = "0.8"
bitflags = "2"
directories = "6"

[profile.dev]
opt-level = 1

[profile.dev.package."*"]
opt-level = 3
