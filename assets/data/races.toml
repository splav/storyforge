## Расы

[[races]]
id          = "human"
name        = "Человек"
description = """Основной народ обжитых земель. Люди составляют население Империи \
Аурум, Братства Аскерия, Железного Обруча и прочих держав. Разнообразны \
в культуре, вере и отношении к магии."""

[[races]]
id          = "beastblood"
name        = "Зверокров"
description = """Племена дикого пограничья, чтущие тотемных зверей. Живут охотой \
и набегами, черпают силу из древней звериной магии. У многих заметны рога, клыки, \
шерсть или жёлтые глаза — черты тотемного предка."""

[[races]]
id          = "grafted"
name        = "Привитый"
description = """Обитатели глубоких лесов, считающие тело незавершённой формой. \
Прививают к себе кору, грибницу, звериные органы и хитин, превращаясь в лесных \
химер."""

[[races]]
id          = "stormborn"
name        = "Грозорождённый"
description = """Выходцы из пустошей и старых рудников, пропитанных металлом \
и буревой магией. Кожа серо-синяя, тела украшены цепями и металлическими \
амулетами. Кочуют воинственными кланами."""

[[races]]
id          = "steppelander"
name        = "Степняк"
description = """Кочевники равнин и сухих холмов. Живут табунами, охотой \
и набегами, чтут силу рода и воинскую доблесть. Наименее связаны \
с магическими искажениями среди диких народов."""

## Фракции

[[factions]]
id          = "aurum"
name        = "Империя Аурум"
description = """Теократия в кризисе. Опирается на храмы, рыцарские ордена \
и инквизицию. Пытается удержать старый порядок, отвечая на слабость Веры \
ужесточением законов."""

[[factions]]
id          = "askeria"
name        = "Братство Аскерия"
description = """Братство магов Воли на территории Аурума. Имеет башни, школы \
и архивы. Считает, что человек обязан брать судьбу в свои руки через знание \
и дисциплину."""

[[factions]]
id          = "iron_ring"
name        = "Железный Обруч"
description = """Союз портов, верфей и инженерных домов. Использует Слёзы Завесы \
как ресурс, стремится сделать магию воспроизводимой и подконтрольной через \
устройства и механизмы."""

[[factions]]
id          = "viridium"
name        = "Великий Виридий"
description = """Общество, где магия Предела и медицина слиты воедино. Живые \
технологии, симбионты, переделка плоти. Их помощь часто пугает тех, кто не привык \
видеть, как исцеление неотличимо от переделки."""

## Пути (источники магии)

[[paths]]
id          = "faith"
name        = "Вера"
description = """Канал связи с богами. Молитвы всё чаще остаются без ответа — \
чудо стало ненадёжным, но не исчезло полностью."""
crit_fail_effect = { type = "broken_faith" }

[[paths]]
id          = "will"
name        = "Воля"
description = """Личная магия, выстроенная на дисциплине и десятилетиях обучения. \
Перегрузка грозит Выгоранием — перманентной потерей большей части дара."""
crit_fail_effect = { type = "mana_overload" }

[[paths]]
id          = "tech"
name        = "Техника"
description = """Использование Слёз Завесы, накопителей, механизмов и артефактов. \
Зависит от сырья, сложного производства и риска поломки."""
crit_fail_effect = { type = "circuit_breach" }

[[paths]]
id          = "heritage"
name        = "Наследие"
description = """Врождённая связь с живым, изменение плоти, биотехнологии. \
Расходует биоресурс организма с риском мутаций."""
crit_fail_effect = { type = "exhaustion" }

[[paths]]
id          = "pact"
name        = "Договор"
description = """Сделка с Гостями Изнанки. Даёт чуждую силу ценой постепенного \
размывания личности и риска одержимости."""
crit_fail_effect = { type = "pact_control" }
