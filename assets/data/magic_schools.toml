# Школы магии
#
# Школа определяется двумя осями:
#   domain  — сфера воздействия (что затрагивает магия)
#   method  — способ воздействия (как магия действует)
#
# Способность может относиться к одному или нескольким доменам,
# но всегда к одному методу.

# ── Домены ──────────────────────────────────────────────────────────────────

[[domains]]
id          = "limit"
name        = "Предел"
description = """Магия жизни и смерти. Предел меняет состояние живого: \
исцеляет раны, насылает болезни, удерживает душу в теле или изгоняет её. \
Маг Предела чувствует границу между жизнью и смертью и умеет сдвигать её \
в обе стороны."""

[[domains]]
id          = "aether"
name        = "Эфир"
description = """Магия силы и явления. Эфир управляет чистой энергией — \
светом, тьмой, жаром, холодом, молнией. Маг Эфира призывает стихийные \
силы и направляет их в виде вспышек, потоков и волн."""

[[domains]]
id          = "form"
name        = "Форма"
description = """Магия вещества и структуры. Форма меняет материю — \
камень, металл, дерево, плоть — придавая ей новые очертания, \
перемещая и преобразуя. Маг Формы возводит стены, создаёт оружие \
из воздуха и открывает проходы сквозь твердь."""

[[domains]]
id          = "mind"
name        = "Разум"
description = """Магия сознания и восприятия. Разум воздействует на мысли, \
чувства и волю: стирает память, насылает страх, создаёт иллюзии, \
подавляет или обостряет ощущения. Маг Разума — тот, кого не замечают, \
пока не поздно."""

# ── Методы ──────────────────────────────────────────────────────────────────

[[methods]]
id          = "creation"
name        = "Созидание"
description = """Создание чего-то нового из ничего или восстановление \
утраченного. Созидание порождает свет, залечивает раны, возводит стены, \
формирует иллюзорные образы."""

[[methods]]
id          = "alteration"
name        = "Изменение"
description = """Трансформация существующего. Изменение усиливает пламя, \
ослабляет броню, мутирует плоть, искажает восприятие — берёт то, \
что есть, и делает другим."""

[[methods]]
id          = "control"
name        = "Контроль"
description = """Подчинение и направление. Контроль не создаёт и не меняет — \
он берёт то, что уже существует, и навязывает свою волю: \
удерживает огонь, парализует тело, сковывает разум, \
запирает дверь на магический замок."""

[[methods]]
id          = "destruction"
name        = "Разрушение"
description = """Уничтожение, рассеивание, подавление. Разрушение гасит свет, \
разрывает плоть, разбивает камень, стирает память — превращает порядок \
в хаос."""
