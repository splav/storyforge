# ── Бой 4. Колокольная крипта ───────────────────────────────────────────────

[[unit_templates]]
id    = "crypt_servant"
name  = "Криптовый служка"
race  = "human"
path  = "pact"
speed = 3

stats     = { max_hp = 12, strength = 4, dexterity = 0, constitution = 2, intelligence = -2, wisdom = -4, charisma = -4 }
equipment = { main_hand = "long_sword", chest = "chainmail", legs = "leather_pants", feet = "leather_boots" }

ability_ids = ["melee_attack", "taunt"]

# Колокольный связанный: аура дезориентирует врагов в радиусе 2.
# Живёт в состав VictoryTarget не входит — его можно обойти, но
# пока жив, партия теряет точность вблизи него.
[[unit_templates]]
id    = "bell_bound"
name  = "Колокольный связанный"
race  = "human"
path  = "pact"
speed = 2

stats     = { max_hp = 14, strength = 2, dexterity = -2, constitution = 4, intelligence = 0, wisdom = -4, charisma = -6 }
equipment = { main_hand = "long_sword", chest = "chainmail", legs = "plate_greaves", feet = "iron_boots" }

ability_ids = ["melee_attack"]

# Настоятель Мерон: VictoryTarget крипты. Фаза 2 — превращение в Эхо Гостя
# через template = "echo_guest". Перенос через VictoryTarget сохраняется —
# игрок должен убить его и в фазе 2.
[[unit_templates]]
id    = "abbott_meron"
name  = "Настоятель Мерон"
race  = "human"
faction = "aurum"
path    = "faith"
speed = 3

stats     = { max_hp = 18, strength = 2, dexterity = 0, constitution = 4, intelligence = 4, wisdom = 6, charisma = 2 }
equipment = { main_hand = "staff", chest = "mage_robe", legs = "cloth_pants", feet = "cloth_shoes" }
resources = { mana = 8 }

ability_ids = ["melee_attack", "heal", "flash"]
