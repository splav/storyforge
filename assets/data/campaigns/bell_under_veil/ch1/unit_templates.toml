# Шаблоны врагов, специфичные для главы I.
# Scenario-local — не светятся в других сценариях.
# Многие encounters используют их через `template = "..."`.

# ── Бой 1. Стычка на старой дороге ──────────────────────────────────────────

[[unit_templates]]
id    = "beastblood_raider"
name  = "Налётчик"
race  = "beastblood"
speed = 5

stats     = { max_hp = 10, strength = 5, dexterity = 3, constitution = 2, intelligence = -4, wisdom = -2, charisma = -4 }
equipment = { main_hand = "dagger", chest = "leather_vest", legs = "leather_pants", feet = "leather_boots" }

ability_ids = ["melee_attack"]

[[unit_templates]]
id    = "beastblood_leader"
name  = "Вожак стаи"
race  = "beastblood"
speed = 4

stats     = { max_hp = 16, strength = 6, dexterity = 2, constitution = 4, intelligence = -2, wisdom = 0, charisma = -2 }
equipment = { main_hand = "long_sword", chest = "heavy_plate", legs = "plate_greaves", feet = "iron_boots" }
resources = { rage = 5 }

ability_ids = ["melee_attack", "taunt"]

