# Глава I: «Колокол под Завесой».
# id сценария = имя папки ("ch1"). Не повторяем в файле.
name = "Колокол под Завесой"

# ── Стартовая партия ────────────────────────────────────────────────────────
# Kael появится после 2-го боя (через scenes.party_add).

[[party]]
name    = "Aldric"
race    = "human"
faction = "aurum"
path    = "faith"
class   = "warrior"
hex_col = 1
hex_row = 2

[[party]]
name    = "Lyra"
race    = "human"
faction = "askeria"
path    = "will"
class   = "mage"
hex_col = 1
hex_row = 4

# ── Сцена 0: Пролог ─────────────────────────────────────────────────────────

[[scenes]]
type = "story"
lines = [
  { speaker = "Рассказчик", text = "Двадцать семь лет назад боги начали молчать. Двенадцать лет назад мир ответил трещинами." },
  { speaker = "Рассказчик", text = "В Тальмире ещё звонят колокола, ещё идут торги и молятся о дожде. Но люди уже шепчут: лес за старой дорогой стал ближе, чем был вчера." },
  { speaker = "Aldric", text = "Монастырь не отвечает три дня. Для Аурума этого достаточно, чтобы послать меч." },
  { speaker = "Lyra", text = "А для Аскерии — чтобы послать того, кто поймёт, почему молчание стало слышно." },
  { speaker = "Староста Тальмира", text = "Найдите братьев. И если дорога правда «свернулась», не дайте этому дойти до города." },
]

# ── Сцена 1: Бой у моста ────────────────────────────────────────────────────

[[scenes]]
type             = "combat"
encounter        = "road_bridge"
location         = "hills"
on_victory_flags = ["bridge_routed", "found_glassworks_token"]

# ── Сцена 2: После 1-го боя — находка на мосту ─────────────────────────────

[[scenes]]
type = "story"
lines = [
  { speaker = "Lyra", text = "Они искали не припасы, не лошадей — именно кристалл." },
  { speaker = "Aldric", text = "Значит, кто-то сказал дикарям, что искать." },
  { speaker = "Раненый возница", text = "Они вышли не из чащи. Они бежали оттуда. Будто в лесу появилось что-то хуже них." },
  { speaker = "Lyra", text = "Медный жетон. Старая стекольня.", requires_flag = "found_glassworks_token" },
  { speaker = "Lyra", text = "Стекольня — зеркала, жар, кристаллы. Плохое место, чтобы держать Слёзы Завесы рядом с тонкой Завесой." },
  { speaker = "Aldric", text = "Тогда идём туда раньше, чем кто-то додумается зажечь печи." },
]

# ── Сцена 3: Бой в стекольне ────────────────────────────────────────────────

[[scenes]]
type             = "combat"
encounter        = "glassworks"
location         = "hills"
on_victory_flags = ["glassworks_cleared", "kael_found"]

# ── Сцена 4: Kael присоединяется ────────────────────────────────────────────

[[scenes]]
type = "story"
lines = [
  { speaker = "Kael", text = "Вы либо очень смелые, либо городские дураки. К монастырю они идут уже неделю.", requires_flag = "kael_found" },
  { speaker = "Aldric", text = "А ты кто такой, чтобы следить за ними один?" },
  { speaker = "Kael", text = "Тот, кто знает тропы. И тот, у кого в этих лесах пропали люди." },
  { speaker = "Lyra", text = "Они везли Слёзы Завесы под монастырь. Кто-то строит там якорь или зов." },
  { speaker = "Kael", text = "Тогда без меня не дойдёте. Лес возле обители больше не стоит на месте." },
]
# Эффект сцены: Kael входит в партию перед следующим боем.
[[scenes.party_add]]
name    = "Kael"
race    = "human"
class   = "ranger"
hex_col = 0
hex_row = 3

# ── Сцена 5: Бой в искажённой чаще ──────────────────────────────────────────

[[scenes]]
type             = "combat"
encounter        = "twisted_grove"
location         = "hills"
on_victory_flags = ["grove_anchor_broken", "novice_saved"]

# ── Сцена 6: Перед финалом ──────────────────────────────────────────────────

[[scenes]]
type = "story"
lines = [
  { speaker = "Спасённый послушник", text = "Настоятель говорил, что бог не ушёл. Что ему нужен только новый сосуд… новый путь вниз.", requires_flag = "novice_saved" },
  { speaker = "Aldric", text = "Он хотел удержать веру любой ценой." },
  { speaker = "Lyra", text = "Нет. Он хотел удержать власть языком веры." },
  { speaker = "Kael", text = "Спорьте потом. Слышите? Колокол не зовёт — он отвечает кому-то снизу." },
  { speaker = "Рассказчик", text = "Под монастырём не было ветра. Но звон всё равно поднимался из глубины, как если бы железо билось о чужое небо." },
]

# ── Сцена 7: Финальный бой — колокольная крипта ─────────────────────────────

[[scenes]]
type             = "combat"
encounter        = "bell_crypt"
location         = "hills"
on_victory_flags = ["bell_silenced"]

# ── Сцена 8: Эпилог ─────────────────────────────────────────────────────────

[[scenes]]
type = "story"
lines = [
  { speaker = "Рассказчик", text = "К утру монастырь ещё стоял. Колокол молчал. Это уже казалось милостью." },
  { speaker = "Aldric", text = "Я думал, ересь выглядит как бунт. А она выглядела как отчаяние." },
  { speaker = "Lyra", text = "И как система, которая трещит, но запрещает назвать трещину трещиной." },
  { speaker = "Kael", text = "Лес успокоился. Не исцелился — просто перестал кричать." },
  { speaker = "Рассказчик", text = "Из крипты вынесли лишь часть кристаллов и книгу без последней главы. На её обложке было выведено одно слово: «Обруч»." },
]
