# Глава I: «Колокол под Завесой».
# id сценария = имя папки ("ch1"). Не повторяем в файле.
name = "Колокол под Завесой"

# ── Стартовая партия ────────────────────────────────────────────────────────
# Kael появится после 2-го боя (через scenes.party_add).

[[party]]
id      = "aldric"
name    = "Aldric"
race    = "human"
faction = "aurum"
path    = "faith"
class   = "warrior"
hex_col = 1
hex_row = 2

[[party]]
id      = "lyra"
name    = "Lyra"
race    = "human"
faction = "askeria"
path    = "will"
class   = "mage"
hex_col = 0
hex_row = 3

# ── Сцена 0: Пролог ─────────────────────────────────────────────────────────

[[scenes]]
type = "story"
lines = [
  { speaker = "Рассказчик", text = "Двадцать семь лет назад боги замолчали, оставив небеса пустыми. Двенадцать лет назад, не выдержав этой глухой тишины, мир ответил трещинами." },
  { speaker = "Рассказчик", text = "Здесь, в приграничном Тальмире, ещё цепляются за осколки прежней жизни. По утрам всё так же гудят колокола, на площадях шумит торг, а жрецы упрямо молятся о дожде. Но по вечерам, плотнее закрывая ставни, люди всё чаще переходят на шёпот: лес за старой паломнической дорогой стал иным. И сегодня он подступил к городу на шаг ближе, чем был вчера." },
  { speaker = "Aldric", text = "От Святого Безмолвия нет вестей уже третий день. Для храмовой дружины Аурума этого срока достаточно, чтобы расчехлить мечи." },
  { speaker = "Lyra", text = "А для коллегий Аскерии — чтобы отправить того, кто способен понять, почему это молчание вдруг стало осязаемым." },
  { speaker = "Староста Тальмира", text = "Найдите святых братьев, господа. И если правы те, кто болтает, будто старая дорога в чащу «свернулась петлёй»... сделайте так, чтобы эта чертовщина не докатилась до городских ворот." },
]

# ── Сцена 1: Бой у моста ────────────────────────────────────────────────────

[[scenes]]
type             = "combat"
encounter        = "road_bridge"
location         = "hills"
on_victory_flags = ["found_glassworks_token"]

# ── Сцена 2: После 1-го боя — находка на мосту ─────────────────────────────

[[scenes]]
type = "story"
lines = [
  { speaker = "Lyra", text = "Взгляни на повозки: припасы целы, кони не тронуты. Эти твари напали на караван не ради наживы или голода. Им нужен был конкретный ящик — тот, что со Слезой Завесы." },
  { speaker = "Aldric", text = "Значит, это не случайный налёт. Наводка была точной." },
  { speaker = "Раненый возница", text = "Они... они не устраивали засаду, господин рыцарь. Они сами бежали из чащи. Ломились сквозь кусты так, словно там, в глубине, проснулось что-то похуже них самих..." },
  { speaker = "Lyra", text = "Это сходится с донесениями архивов. Шаманы зверокровов давно твердят, что лесные духи слабеют. Дикари не охотились на мосту — они спасали свои шкуры." },
  { speaker = "Lyra", text = "Смотри, что осталось в кулаке у их вожака. Медный жетон с клеймом старой стекольни на кромке леса.", requires_flag = "found_glassworks_token" },
  { speaker = "Lyra", text = "Печи, выплавка зеркал, концентрация кристаллов... Худшее место, чтобы держать Слёзы Завесы. В таких точках ткань мира рвётся от малейшего сквозняка." },
  { speaker = "Aldric", text = "Тогда идём туда. И лучше нам успеть до того, как у кого-нибудь хватит ума разжечь эти печи." },
]

# ── Сцена 3: Бой в стекольне ────────────────────────────────────────────────

[[scenes]]
type             = "combat"
encounter        = "glassworks"
location         = "hills"
on_victory_flags = ["kael_found"]

# ── Сцена 4: Kael присоединяется ────────────────────────────────────────────

[[scenes]]
type = "story"
lines = [
  { speaker = "Kael", text = "Либо вы до безумия храбрые, либо просто городские дураки. Контрабандисты таскают этот груз к монастырским подвалам уже добрую неделю.", requires_flag = "kael_found" },
  { speaker = "Aldric", text = "А ты кто такой, чтобы дышать нам в спину? И почему выслеживаешь их в одиночку?" },
  { speaker = "Kael", text = "Пограничник я. По бабке — из зверокровов, по долгу службы — здешний проводник. Из моего отряда в этих лесах трое пропали. Насмерть." },
  { speaker = "Lyra", text = "Значит, кристаллы свозили в обитель намеренно. Кто-то пытается выстроить там сильный резонирующий контур. Создать якорь... или зов." },
  { speaker = "Kael", text = "Каким бы ни был их замысел, без меня вы до обители не доберётесь. Лес перед монастырём сошёл с ума, тропы зациклились и больше не стоят на месте. Звери бегут, духи прячутся, а там, откуда они уходят, всегда прорастает чужая гниль." },
]
# Эффект сцены: Kael входит в партию перед следующим боем.
[[scenes.party_add]]
name    = "Kael"
race    = "human"
faction = "aurum"
class   = "ranger"
hex_col = 0
hex_row = 1

# ── Сцена 5: Бой в искажённой чаще ──────────────────────────────────────────

[[scenes]]
type             = "combat"
encounter        = "twisted_grove"
location         = "hills"
on_victory_flags = ["novice_saved"]

# ── Сцена 6: Перед финалом ──────────────────────────────────────────────────

[[scenes]]
type = "story"
lines = [
  { speaker = "Спасённый послушник", text = "Настоятель... отец Мерон говорил нам, что боги не оставляли Аурум. Он твердил, что чуду просто нужен новый сосуд... новый, чистый путь вниз, под землю...", requires_flag = "novice_saved" },
  { speaker = "Aldric", text = "Ослепший старец. Он пытался удержать угасающую веру любой ценой, но сотворил худший из грехов." },
  { speaker = "Lyra", text = "Не будь наивным, Алдрик. Он цеплялся за ускользающую власть над паствой, просто умело использовал для этого привычный язык веры." },
  { speaker = "Kael", text = "Хватит лаяться, теологи. Прислушайтесь. Этот колокол бьёт не для живых, и он не зовёт к молитве. Он кому-то отвечает. Там, внизу." },
  { speaker = "Рассказчик", text = "В подземной крипте царил мёртвый штиль, не колыхалась ни одна паутина. Но гулкий, удушливый звон всё равно поднимался из темноты — так, словно тяжёлое монастырское железо мерно билось о край чужого, ледяного неба." },
]

# ── Сцена 7: Финальный бой — колокольная крипта ─────────────────────────────

[[scenes]]
type             = "combat"
encounter        = "bell_crypt"
location         = "hills"

# ── Сцена 8: Эпилог ─────────────────────────────────────────────────────────

[[scenes]]
type = "story"
lines = [
  { speaker = "Рассказчик", text = "К утру древние стены монастыря всё ещё стояли. Колокол в крипте наконец замолчал, и сама эта тишина казалась измученным героям высшим проявлением милости." },
  { speaker = "Aldric", text = "В храмовых доктринах нас учат, что ересь — это всегда бунт гордецов. А здесь... здесь я увидел лишь слепое, уродливое отчаяние." },
  { speaker = "Lyra", text = "Естественный финал для старого порядка. Ваша система трещит по швам, Алдрик, но ваши догмы строго-настрого запрещают называть трещину трещиной." },
  { speaker = "Kael", text = "Чаща затихла. Земля не исцелилась, нет — скверну так просто не выжечь. Но, по крайней мере, лес перестал исходить криком." },
  { speaker = "Lyra", text = "Рано радоваться. Это далеко не последний колокол, который зазвонит без человеческих рук. Нам просто повезло оказаться здесь первыми." },
  { speaker = "Рассказчик", text = "Из тёмной крипты на свет вынесли лишь горсть тускнеющих кристаллов да старинную книгу с вырванным концом. На её потемневшей кожаной обложке было вытиснено всего одно слово: «Обруч»." },
]
