# Глава III: «Остров швов».
# id сценария = имя папки ("ch3"). Дизайн — ch3/docs/description.md;
# вычитанная проза — ch3/docs/scenario-script.md (прозу НЕ менять);
# движковые требования — ch3/docs/engine-requirements.md.
#
# Структура: пролог (П-1..П-3) → бой 1 (высадка, беречь лодку) → Орен + рана
# Aldric → бой 2 (лаборатории) → баки/Маркен → ВЫБОР Тэо (theo_fate) → ветка
# (переговоры | бой 3) → правда о Касиане → Хорст/Контейнер → бой 4 → эпилог
# (boat_saved-реплики) → ВЫБОР Касиана (kasian_choice, 3 исхода) → закрытие.
#
# Ветвление — через флаги (Волна 1): Choice → set_flag; scene-level requires_flag
# скипает сцену, если флаг не выставлен; line-level requires_flag/excludes_flag
# показывает/прячет реплику. Флаги: theo_surrendered/theo_fight (выбор), theo_killed
# /marken_killed (objectives боя 3), boat_saved (objective боя 1), kasian_*.
#
# location = "hills" — переиспользованный фон боя (арт Острова — полиш, Фаза 5).

name = "Остров швов"

# ── Стартовая партия (Aldric, Lyra, Kael — как в конце ch2) ──────────────────

[[party]]
name    = "Aldric"
race    = "human"
faction = "aurum"
path    = "faith"
class   = "warrior"
hex_col = 1
hex_row = 3

[[party]]
name    = "Lyra"
race    = "human"
faction = "askeria"
path    = "will"
class   = "mage"
hex_col = 0
hex_row = 4

[[party]]
name    = "Kael"
race    = "human"
faction = "aurum"
class   = "ranger"
hex_col = 1
hex_row = 2

# ── Пролог П-1: Главный архив Аскерии ────────────────────────────────────────

[[scenes]]
type = "story"
lines = [
  { speaker = "Рассказчик", text = "Даже три недели спустя Лимна не отпустила их. Бумаги Колма легли на гладкий стол столичного архива веером накладных, а поверх всего — знакомый Lyra со студенческой скамьи почерк с аккуратным наклоном влево. Эразм Тэо. Возле его имени значилось место, которого не было ни на одной карте: Остров." },
  { speaker = "Касиан", text = "Этого острова нет в лоциях, и поверьте, это не оплошность картографов. Случайные суда туда не заходят. Туда свозят целенаправленно. Я нашёл человека, который знает путь: гадатель из старых портовых семей Лимны. Он вас проведёт." },
  { speaker = "Lyra", text = "Ты нанимаешь проводника к месту, которого нет на картах? Касиан... как давно ты смотришь в эту сторону?" },
  { speaker = "Касиан", text = "Дольше, чем ты. Моя работа — смотреть туда, куда другие ещё не догадались повернуть голову. Привези мне то, что они там синтезируют. Остальное — моя забота." },
  { speaker = "Aldric", text = "Если там поставили ересь на поточное производство — это уже забота храмов Аурума. А не только твоя." },
  { speaker = "Касиан", text = "Добудете доказательства — и это станет хоть чьей заботой. Но пока — это моя операция." },
  { speaker = "Kael", text = "В списках грузов было имя. Маркен Лесогор. Это моя кровь. И я еду туда не за твоими доказательствами, магистр." },
  { speaker = "Касиан", text = "Знаю, следопыт. Потому и беру. Тот, кому есть кого спасать или хоронить, не свернёт на полпути." },
]

# ── Пролог П-2: Лимна, дальний пирс ──────────────────────────────────────────

[[scenes]]
type = "story"
lines = [
  { speaker = "Рассказчик", text = "Лимна вновь встретила их запахом гниющей сладкой воды и смолы. На самом краю дальнего пирса, где обрывался свет вечерних фонарей, их ждал человек с обветренным лицом. Он смотрел не на пассажиров, а сквозь них — в тёмную рябь воды." },
  { speaker = "Венн", text = "Касиан платит — я веду. Что вы там забыли, не моего ума дело. Уговор один: если назад в лодку сядут не все, это ваши проблемы, а не моей воды." },
  { speaker = "Lyra", text = "Нам сказали, ты единственный, кто знает туда фарватер." },
  { speaker = "Венн", text = "Дорогу туда чуют немногие. А возвращаются по ней — и того реже. Я вожу вас не потому, что смелый. А потому, что кожей чую: где вода ещё держит киль, а где готова разойтись под днищем." },
  { speaker = "Kael", text = "Он знает этот гиблый путь слишком хорошо для случайного извозчика." },
  { speaker = "Aldric", text = "Как и любой, кого нанимает Касиан." },
]

# ── Пролог П-3: На борту, переход через Искажения ────────────────────────────
# Перед высадкой Лодка добавляется в партию как NonActingNpc (perma-stun из
# шаблона boat). Её надо уберечь в бою 1 → objective boat_saved.

[[scenes]]
type = "story"
lines = [
  { speaker = "Рассказчик", text = "К полудню берег растаял в мареве, а к закату исчез и горизонт. Море здесь шло неправильными волнами: то застывало как мутное стекло, то вскипало воронками без единого порыва ветра. Свет преломлялся под больными углами, будто солнце светило откуда-то из-под воды." },
  { speaker = "Венн", text = "Реже моргайте. И не пяльтесь подолгу в одну точку за бортом. Здешняя вода любит, когда на неё смотрят. Смотреть здесь — всё равно что звать." },
  { speaker = "Lyra", text = "Что нас ждёт на берегу?" },
  { speaker = "Венн", text = "Берег. Я вглубь не хожу. А кто ходил — уже ничего никому не расскажет. Спрашивайте не меня, магичка. Спрашивайте тех, кого там держат." },
]

[[scenes.party_add]]
name     = "Лодка"
race     = "object"
hex_col  = 1
hex_row  = 1
template = "boat"

# ── Бой 1: Высадка на берегу (беречь лодку → boat_saved) ──────────────────────

[[scenes]]
type      = "combat"
encounter = "ch3_landing"
location  = "hills"

# ── После боя 1: берег, встреча с Ореном ─────────────────────────────────────
# Орен входит в партию (party_add). Лодка остаётся на берегу (party_remove).
# Aldric получает injured (−1 броня, −1 скорость) на бой 2 — статус снимется
# после боя 2 (Remove в сцене «Баки, Маркен»).

[[scenes]]
type = "story"
lines = [
  { speaker = "Венн", text = "Дальше вы сами. Довезу обратно, коли будет кого. И лодку мне не продырявьте — другой петли отсюда нет. Местная вода даром не носит." },
  { speaker = "Рассказчик", text = "Внутрь острова вёл пролом в глухой скале — сырой коридор, разивший йодом, медью и кровью. Aldric держался до самого берега на голом упрямстве, но рану было не скрыть; в темноте тоннеля он тяжело осел у стены. Из боковой ниши неслышно вышел сутулый человек. Его передник был пропитан бурым, но руки — хирургически точные — не принадлежали стражнику." },
  { speaker = "Орен", text = "Лежи тихо, рыцарь. Задень они артерию — и я бы уже паковал труп. Везучий ты." },
  { speaker = "Lyra", text = "Кто ты такой?" },
  { speaker = "Орен", text = "Тот, кого тут держат, чтобы такие, как он, не дохли раньше, чем нужно начальству. Своим шумом вы только что сломали мне вечерний обход — впервые за два года. А теперь помолчите и дайте рукам работать." },
  { speaker = "Aldric", text = "Я... не просил помощи." },
  { speaker = "Орен", text = "А здесь никто не просит. Просто не вздумай помереть у меня на грязном полу, рыцарь. Мне и без тебя работы хватает." },
  { speaker = "Kael", text = "Ты здешний. Лекарь. Выходит, это ты их штопал. Всех, кого привозили." },
  { speaker = "Орен", text = "Штопал. Буду честен с тобой, следопыт: среди прочих был и тот, на чьё имя ты сейчас так похоже смотришь. Поднимайтесь. Я покажу вам ваше «производство», прежде чем вы наломаете дров." },
]

[[scenes.party_add]]
name     = "Орен"
race     = "human"
faction  = "viridium"
hex_col  = 0
hex_row  = 3
template = "oren"

party_remove = ["Лодка"]

[[scenes.status_ops]]
op        = "add"
unit_name = "Aldric"
status_id = "injured"

# ── Бой 2: Лаборатории / Живые анфилады (вчетвером, Aldric injured) ───────────

[[scenes]]
type      = "combat"
encounter = "ch3_labs"
location  = "hills"

# ── После боя 2: баки, Маркен. Рана Aldric затухает (Remove injured). ─────────

[[scenes]]
type = "story"
lines = [
  { speaker = "Рассказчик", text = "Главный зал больше походил на скотобойню, стерилизованную до скрипа. Вдоль стен тянулись стеклянные резервуары." },
  { speaker = "Орен", text = "Вот оно. Никакого религиозного безумства. Только расписание, смены по восемь часов и обед по звонку гонга. От этой рутины мутит сильнее, чем от вида крови." },
  { speaker = "Lyra", text = "Они... дышат. Они живы." },
  { speaker = "Орен", text = "В каком-то смысле. Гость внутри каждого подогнан по размеру, как костюм. Тэо не любит убивать — он «консервирует». Он бы страшно оскорбился слову «жертва». Предпочитает слово «материал»." },
  { speaker = "Kael", text = "Маркен. Моя кровь." },
  { speaker = "Орен", text = "Знаю. Я полгода удерживал в нём дыхание. До сих пор не уверен, что это милосердие, а не проклятье. Скоро тебе придётся решать, что с ним делать." },
  { speaker = "Kael", text = "...Там уже нет Маркена." },
  { speaker = "Орен", text = "И пустоты там тоже нет. Виридийский трибунал сжёг бы нас обоих дотла за одну попытку. А Тэо поставил его в бак и присвоил инвентарный номер." },
  { speaker = "Aldric", text = "Это хуже смерти или всё-таки лучше?" },
  { speaker = "Lyra", text = "Хочешь знать — спроси у архитектора всего этого. Тэо ждёт нас дальше." },
]

[[scenes.status_ops]]
op        = "remove"
unit_name = "Aldric"
status_id = "injured"

# ── ВЫБОР: Тэо (theo_fate) ───────────────────────────────────────────────────
# "Переговоры" → theo_surrendered (бой 3 пропускается, Тэо в бой 4 не идёт).
# "Бой"        → theo_fight (играется бой 3).

[[scenes]]
type = "choice"
lines = [
  { speaker = "Рассказчик", text = "Сердце лаборатории заливал чистый хирургический свет. В центре, спокойный и опрятный, словно ждал гостей к чаю, стоял человек в безупречно скроенном камзоле. Между ним и отрядом неподвижно покачивались несколько фигур: носители, поднятые из баков. Под их кожей ходуном ходило чужое присутствие. В первом ряду стоял Маркен." },
  { speaker = "Тэо", text = "Lyra. Я не сомневался, что Касиан кого-нибудь пришлёт, но искренне надеялся, что выберет тебя. Значит, мои расчёты не лгут." },
  { speaker = "Lyra", text = "Я здесь, чтобы сровнять с землёй то, что ты построил, Эразм." },
  { speaker = "Тэо", text = "Ты здесь, чтобы спасти меня от того, чем я стал. Это разные вещи, и, увы, тебе не по силам ни то, ни другое. Но я готов к дискуссии. Опустите оружие. Нас разделяют люди — те самые, которых вам так жаль. Шагнёте ко мне — шагнёте по ним." },
]
options = [
  { label = "Опустить оружие — выслушать Тэо", set_flag = "theo_surrendered" },
  { label = "Прорываться к Тэо с боем",        set_flag = "theo_fight" },
]

# ── Ветка A: переговоры (Тэо сдаётся) ────────────────────────────────────────

[[scenes]]
type = "story"
requires_flag = "theo_surrendered"
lines = [
  { speaker = "Lyra", text = "Скажи мне одну вещь. Ты ждал нас целую неделю. Кто тебя предупредил?" },
  { speaker = "Тэо", text = "Он прислал весточку. Как всегда — шифром между строк, чтобы, если что, сказать, что бумаги чисты. Касиан на моей стороне, Lyra. Просто он молчит об этом. Иначе я гнил бы в храмовой тюрьме ещё пять лет назад." },
  { speaker = "Lyra", text = "...Или он просто использует тебя. Как использует меня. Ты ему не партнёр, Эразм. Ты для него полигон. Точно такой же, как я." },
  { speaker = "Тэо", text = "Это ты сейчас придумала, чтобы тебе было проще меня убить?" },
  { speaker = "Lyra", text = "Это я сейчас поняла. Увидев твоё лицо." },
  { speaker = "Рассказчик", text = "В глазах Тэо что-то надломилось. Он обернулся и посмотрел на стоящих вокруг носителей — возможно, впервые увидев в них сломанных людей, а не стабилизированный материал. И опустил руки." },
  { speaker = "Тэо", text = "Уведите меня. К Хорсту я не пойду. Пусть мой крах останется между нами, а не среди тел этих несчастных." },
  { speaker = "Орен", text = "Надо же. Сдался. А я-то думал, такие умники скорее перережут себе глотку, чем признают ошибку в расчётах." },
  { speaker = "Lyra", text = "Он не признал ошибку. Он вдруг понял, что стоит здесь один." },
]

# ── Ветка B: бой (прорыв через носителей) ────────────────────────────────────

[[scenes]]
type = "story"
requires_flag = "theo_fight"
lines = [
  { speaker = "Lyra", text = "Нас разделяют твои жертвы. И это всё, что мне нужно знать, Эразм. Ты построил систему и теперь прячешься за спинами тех, кого сам же сломал." },
  { speaker = "Тэо", text = "Я ни от кого не прячусь. Я стою на своём месте. А они — там, где я их поставил. Хочешь добраться до меня — покажи, чего на самом деле стоит твоё милосердие." },
  { speaker = "Рассказчик", text = "Носители синхронно вытянули руки. Маркен повернул голову на сдавленный окрик Kael — и в его пустых глазах не было ни капли узнавания. Глаза были заняты." },
]

# ── Бой 3: Встреча с Тэо (только в ветке боя) ────────────────────────────────
# Скипается при theo_surrendered. theo_killed/marken_killed — objectives энкаунтера.

[[scenes]]
type          = "combat"
encounter     = "ch3_theo"
location      = "hills"
requires_flag = "theo_fight"

# ── После боя 3 / переговоров: правда о Касиане ──────────────────────────────
# Общие реплики + условные по исходу:
#  - marken_killed → Kael «закрыл глаза»;
#  - theo_killed без marken_killed (Маркен жив/одержим) → Kael «рука дрогнула»;
#  - theo_surrendered → Орен + Lyra про сдавшегося Тэо.

[[scenes]]
type = "story"
lines = [
  { speaker = "Рассказчик", text = "На столе Тэо остались кипы исписанных листов. Среди формул и чертежей биомеханики прятались короткие приписки, которых не отправляют посторонним: «По нашему уговору», «Как мы и обсуждали». На полях стоял короткий росчерк. Буква «К». Рубашка Lyra покрылась холодным потом — она узнала бы этот росчерк из тысяч." },
  { speaker = "Lyra", text = "Это не старые связи... Это отчёты. Переписка, тянущаяся годами. Касиан не просто \"знал о деле\". Он вёл его. Он финансировал Тэо." },
  { speaker = "Aldric", text = "Это чистая, кристальная ересь." },
  { speaker = "Lyra", text = "Это хуже. Это метод. Ересь — это когда фанатично верят. А Касиан не верит. Он просто вычисляет." },
  { speaker = "Kael", text = "Маркен остался здесь. От чьего клинка — уже не важно. Я шёл за ним три месяца, чтобы закрыть ему глаза своими руками. Дошёл.", requires_flag = "marken_killed" },
  { speaker = "Kael", text = "Я не смог спустить тетиву. Оставил его там... с этой тварью под кожей. Не знаю, спас ли я его или обрёк на худшее. Знаю только, что рука дрогнула.", requires_flag = "theo_killed", excludes_flag = "marken_killed" },
  { speaker = "Орен", text = "Ваш умник жив. Запрётся в камере, будет ровным почерком писать мемуары, пока мы расхлёбываем всю эту кровь. Чистенький, как стёклышко, до самого конца.", requires_flag = "theo_surrendered" },
  { speaker = "Lyra", text = "Пусть живёт. Мёртвый он превратится в мученика науки. А живой — он просто человек, который жестоко проиграл спор.", requires_flag = "theo_surrendered" },
]

# ── Перед боем 4: Хорст и Контейнер ──────────────────────────────────────────

[[scenes]]
type = "story"
lines = [
  { speaker = "Рассказчик", text = "Самый дальний зал был похож на корабельный док, опутанный живыми кабелями. На низком стальном помосте тяжело дышало нечто человекоподобное, но собранное вопреки всем законам анатомии. Рядом с ним, не выказывая ни капли животного страха, перебирал инструменты седой человек в засаленном комбинезоне." },
  { speaker = "Хорст", text = "А, проверяющие. Тэо предупреждал, что вы прорвётесь. Моё имя Хорст. Сразу скажу: я не маг и не пророк. Я простой мастер. Мне спустили задачу: удержать Гостя в мясной оболочке, чтобы он её не разорвал. Я задачу выполнил. Вот результат, дышит ровно." },
  { speaker = "Lyra", text = "Ты хоть отдаёшь себе отчёт в том, что ты сотворил?" },
  { speaker = "Хорст", text = "Я отдаю себе отчёт в том, где у него швы и при каком давлении они разойдутся. А о судьбах мира — это вы к жрецам идите. Или к вашему Касиану. Мне платят за ответ на вопрос «как», а не «зачем»." },
  { speaker = "Aldric", text = "Перед тобой мерзость, от которой содрогнулся бы сам Мерон. А ты говоришь о ней так, будто чинишь сломанную телегу!" },
  { speaker = "Хорст", text = "Телега, человек, демон из Завесы — у всего есть шестерёнки. Я чиню шестерёнки. Можем разойтись мирно, я не солдат... Ох. Кажется, он проснулся от вашего крика. Боюсь, дальше договариваться придётся с ним." },
  { speaker = "Рассказчик", text = "Тварь на помосте судорожно дёрнулась. Сущность, глядевшая сквозь сшитое лицо, не имела ничего общего с нашим миром. Сочленения Контейнера издали влажный хруст, и он слепо шагнул вперёд." },
  { speaker = "Контейнер", text = "...очень. давно. тесно. здесь." },
]

