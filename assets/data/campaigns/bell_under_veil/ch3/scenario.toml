  { speaker = "Рассказчик", text = "Остров растаял за искривлённым горизонтом, так и оставшись безымянным. То, что там создали, не умрёт вместе с одним разбитым Контейнером. Но те, кто возвращался с этого берега, теперь твёрдо знали главное: на какой стороне разлома они стоят. Расползающийся мир не починить старыми молитвами Аурума. Завеса открыта. И назад дороги нет." },
