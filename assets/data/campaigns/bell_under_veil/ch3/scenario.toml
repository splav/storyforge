[[scenes]]
type = "choice"
lines = [
  { speaker = "Рассказчик", text = "На подходе к материку их перехватил быстроходный бот под вымпелом Аскерии. Бледный курьер передал Lyra запечатанный тубус и тут же отвалил, не требуя ответа." },
  { speaker = "Lyra", text = "Он предлагает союз. Золото, защиту и неприкосновенность в обмен на молчание о его роли. Пишет, что Остров — это только начало, и Аскерия обязана взять этот ресурс под контроль. И ни одной подписи. Даже инициала. Достаточно того, что я узнаю его тон." },
  { speaker = "Aldric", text = "Он дёргал за ниточки с самого начала. Теперь он хочет купить тебя тем же, чем купил Тэо." },
  { speaker = "Kael", text = "Выбор за тобой, маг. Это твой наставник. И тебе решать, чью руку мы пожмём." },
