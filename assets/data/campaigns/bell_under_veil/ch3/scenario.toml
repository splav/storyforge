lines = [
  { speaker = "Рассказчик", text = "Контейнер обрушился на помост. Он не просто умер — он осыпался, будто чертёж, из которого выдернули главную ось. На металле осталась лишь бесформенная груда мёртвой ткани и стремительно тускнеющие кристаллы." },
  { speaker = "Хорст", text = "Работаете чисто. Но это была только третья сборка. Удастся на пятой, не у меня, так у соседей. Секрет того, как это делается, уже открыт. Обратно в бутылку это не засунешь." },
  { speaker = "Lyra", text = "Значит, мы будем стирать в порошок каждого, кто помнит этот секрет." },
  { speaker = "Хорст", text = "Память людская — тоже механизм. Очень ненадёжный. Удачи." },
  { speaker = "Орен", text = "Вот и всё. Столько лет работы — в горсть гниющей слизи. Я держал этих тварей живыми голыми руками. А теперь смотрю на этот мусор и не чувствую ровным счётом ничего. Кажется, это в моей ситуации самое паршивое." },
]

