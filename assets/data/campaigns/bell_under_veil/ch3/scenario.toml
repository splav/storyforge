lines = [
  { speaker = "Lyra", text = "Мы не будем договариваться. Но и прятаться я не стану. Касиан строил эти лаборатории чужими руками у нас под носом. Я уничтожу всё, к чему он причастен. Даже если это подожжёт саму башню Аскерии." },
  { speaker = "Aldric", text = "Ты хоть отдаёшь себе отчёт? Это полноценный раскол ордена." },
  { speaker = "Lyra", text = "Орден давно расколот, Aldric. Мы просто делаем вид, что трещины нет, чтобы не пугать народ. Пора назвать её вслух." },
  { speaker = "Рассказчик", text = "Она не сожгла компромат и не спрятала его на груди. Она приколола письмо кинжалом к морской карте — прямо поверх безымянного пятна острова. Это была первая отметка их будущей охоты на наставника." },
