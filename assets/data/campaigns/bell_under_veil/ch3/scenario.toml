  { speaker = "Lyra", text = "Зато против. А не в одной упряжке с ним." },
  { speaker = "Рассказчик", text = "Она поднесла край письма к масляному фонарю. Горячие хлопья пепла сдуло в серое море. За всё это время Касиан не задал ей ни одного вопроса, и эта ледяная осведомлённость пугала сильнее открытых угроз. Теперь между ними не осталось даже академической вежливости." },
