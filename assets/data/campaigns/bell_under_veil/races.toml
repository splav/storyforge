# Расовые префиксы, специфичные для «Колокола под Завесой».
# Перекрывают/дополняют глобальные записи только по совпадающим id;
# остальные глобальные расы/фракции/пути остаются доступными.

[[races]]
id          = "fey"
name        = "Морочник"
description = """Существа, рождённые из тонкой Завесы и снов леса. Не живые \
в обычном смысле: сгусток восприятия и чужой памяти, принявший форму. Легко \
рассеиваются, но быстро восстанавливаются, пока жив источник Искажения."""

[[races]]
id          = "aberration"
name        = "Изнанка"
description = """Проявленное присутствие Гостя в нашем мире. Не имеет устойчивой \
формы — собирается из света в трещинах, голосов в черепе и длинных рук, которые \
не всегда подчиняются анатомии. Плоть «хозяина» служит якорем."""

# Неодушевлённый объект как боевая сущность с HP (лодка, повозка и т.п.).
# Не действует (в энкаунтере помечается NonActingNpc), но может быть уничтожен —
# используется для вторичных целей вроде «сохранить лодку» (boat_saved).
[[races]]
id          = "object"
name        = "Предмет"
description = """Неживой объект, способный получать урон и быть уничтоженным, но \
не действующий сам по себе. Лодка у кромки воды, опорная конструкция, груз — то, \
что нужно защитить или разрушить."""
