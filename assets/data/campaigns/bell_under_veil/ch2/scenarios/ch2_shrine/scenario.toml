# Глава II, Сценарий 1: Тронутое святилище.
# Магистр присоединяется к партии как временный союзник.
# Победа: убить всех врагов + сохранить жизнь Магистру.

name = "Тронутое святилище"

# ── Стартовая партия ────────────────────────────────────────────────────────
# Базовые герои кампании Bell Under Veil.

[[party]]
name    = "Aldric"
race    = "human"
faction = "aurum"
path    = "faith"
class   = "warrior"
hex_col = 1
hex_row = 2

[[party]]
name    = "Lyra"
race    = "human"
faction = "askeria"
path    = "will"
class   = "mage"
hex_col = 0
hex_row = 3

# ── Сцена 0: Магистр присоединяется перед боем ──────────────────────────────

[[scenes]]
type = "story"
lines = [
  { speaker = "Рассказчик", text = "На пороге святилища лежал раненый человек в разорванных мантиях магистра." },
  { speaker = "Магистр", text = "Они пришли ночью. Я пытался запечатать алтарь, но их было слишком много." },
  { speaker = "Aldric", text = "Вы можете двигаться?" },
  { speaker = "Магистр", text = "Нет. Но я ещё могу держаться, если вы защитите меня." },
]

[[scenes.party_add]]
name     = "Магистр"
race     = "human"
path     = "faith"
hex_col  = 6
hex_row  = 4
template = "wounded_magister"

# ── Сцена 1: Бой у святилища ─────────────────────────────────────────────────

[[scenes]]
type             = "combat"
encounter        = "ch2_shrine"
location         = "hills"
on_victory_flags = ["shrine_cleared"]

# ── Сцена 2: Магистр покидает партию ────────────────────────────────────────

[[scenes]]
type = "story"
lines = [
  { speaker = "Магистр", text = "Вы спасли меня. Алтарь больше не отвечает им — пока." },
  { speaker = "Lyra", text = "Что значит «пока»?" },
  { speaker = "Магистр", text = "Завеса истончается. То, что вы видели здесь — только первые трещины." },
  { speaker = "Aldric", text = "Тогда нам нужно найти источник." },
  { speaker = "Рассказчик", text = "Магистр попрощался и удалился в глубь монастыря. Путь героев лежал дальше." },
]

party_remove = ["Магистр"]
