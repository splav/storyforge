# Глава II: «След медной книги».
# id сценария = имя папки ("ch2"). Дизайн-док — ch2/docs/description.md.
#
# Линейная цепочка: пролог → бой 1 (засада/ловушки) → ... (бои 2–4 добавляются
# по мере готовности). Партия — Aldric, Lyra, Kael (все трое с начала главы).

name = "След медной книги"

# ── Стартовая партия ────────────────────────────────────────────────────────

[[party]]
name    = "Aldric"
race    = "human"
faction = "aurum"
path    = "faith"
class   = "warrior"
hex_col = 1
hex_row = 3

[[party]]
name    = "Lyra"
race    = "human"
faction = "askeria"
path    = "will"
class   = "mage"
hex_col = 0
hex_row = 4

# Kael — следопыт. Его пассивка scout_traps раскрывает ловушки в радиусе 2
# на старте хода и при движении. Спавнится впереди — разведчик авангарда.
[[party]]
name    = "Kael"
race    = "human"
faction = "aurum"
class   = "ranger"
hex_col = 1
hex_row = 2

# ── Сцена 0: Пролог ─────────────────────────────────────────────────────────

[[scenes]]
type = "story"
lines = [
  { speaker = "Рассказчик", text = "Через два месяца после Тальмира. Письмо магистра Касиана Велла нашло Lyra в Главном архиве Аскерии." },
  { speaker = "Касиан", text = "В Лимне сидит купец. Тибор Колм. Перепродаёт Слёзы — и не на открытом рынке. Нам нужно знать, кому именно." },
  { speaker = "Lyra", text = "Почему мы, а не Корона?" },
  { speaker = "Касиан", text = "Потому что в Короне у Колма свои люди. Я хочу знать раньше них. Aldric пусть едет с тобой — на него меньше смотрят." },
  { speaker = "Рассказчик", text = "Утром, в дороге. Партия едет в составе купеческого каравана со стеклом из тальмирской мастерской — для прикрытия." },
  { speaker = "Aldric", text = "Что ты сказала храму?" },
  { speaker = "Lyra", text = "Что еду в Лимну закрывать переписку с тамошним архивом. Они даже не уточнили, что за переписка." },
  { speaker = "Kael", text = "Тихо. Слишком тихо для тракта у Лимны." },
]

# ── Сцена 1: Бой 1 — засада на тракте ────────────────────────────────────────

[[scenes]]
type             = "combat"
encounter        = "ch2_ambush"
location         = "hills"
on_victory_flags = ["ambush_cleared"]

# ── Сцена 2: После 1-го боя ──────────────────────────────────────────────────

[[scenes]]
type = "story"
lines = [
  { speaker = "Lyra", text = "Это не случайные бандиты. На главаре — медный перстень. Метка цеха или гильдии. Нужно узнать, какой." },
  { speaker = "Aldric", text = "Колм?" },
  { speaker = "Lyra", text = "Думаю, кто-то против Колма. Колм работает чище — он не оставляет таких знаков на ладонях." },
  { speaker = "Kael", text = "Они ждали. Возница каравана говорит: вышли бы утром — взяли бы. Кто-то торгует расписаниями." },
  { speaker = "Lyra", text = "Все эти ловушки, перстни — это Лимна. Едем туда. Но не прямо." },
  { speaker = "Kael", text = "По дороге есть святилище. Касиан говорил — магистр Эрик, изучает Истончение. Хотел, чтобы мы зашли." },
]

# ── Сцена 3: У святилища — Эрик присоединяется как защищаемый NPC ─────────────

[[scenes]]
type = "story"
lines = [
  { speaker = "Рассказчик", text = "Заброшенное придорожное святилище: старые каменные стены, обвалившаяся крыша, осыпавшийся алтарь. На пороге — раненый человек в разорванных мантиях магистра Аскерии." },
  { speaker = "Магистр Эрик", text = "Они пришли... ночью. Залётный Гость пристроился к паломнику, а место его... согревает. Я не успел запечатать алтарь." },
  { speaker = "Lyra", text = "Эрик. Не двигайся. Мы прикроем." },
  { speaker = "Магистр Эрик", text = "Их трое. Тот, что в серой накидке — не человек уже. Берегите спину... и меня, если можете." },
]

# Эрик входит в партию неподвижным NPC: permanent stun (из шаблона
# wounded_magister), лежит у стены на стороне партии. Цель боя — сохранить его.
[[scenes.party_add]]
name     = "Магистр Эрик"
race     = "human"
path     = "faith"
hex_col  = 2
hex_row  = 4
template = "wounded_magister"

# ── Сцена 4: Бой 2 — тронутое святилище ──────────────────────────────────────

[[scenes]]
type             = "combat"
encounter        = "ch2_shrine"
location         = "hills"
on_victory_flags = ["shrine_cleared"]

# ── Сцена 5: После 2-го боя — Эрик умирает, называет имена ────────────────────

[[scenes]]
type = "story"
lines = [
  { speaker = "Lyra", text = "Магистр. Можешь говорить?" },
  { speaker = "Магистр Эрик", text = "Lyra... ты пришла. Этот Гость — не Колма, не Мерона. Просто залётный. Их... много. Я считал шесть в моём районе за год. Раньше — один-два." },
  { speaker = "Aldric", text = "Что ты нашёл про Колм?" },
  { speaker = "Магистр Эрик", text = "Груз идёт через порт. Возьми сумку — там всё. И письма... одно имя ты узнаешь." },
  { speaker = "Рассказчик", text = "Эрик умирает. Lyra разбирает документы. В одном из писем — имя «Эразм Тэо». В рабочих заметках — список исчезнувших за год." },
  { speaker = "Lyra", text = "Эразм Тэо. Со студенчества. Ушёл из ордена пять лет назад — я думала, отошёл от дел." },
  { speaker = "Kael", text = "Здесь Маркен Лесогор. Это мой." },
  { speaker = "Aldric", text = "Тогда в Лимну." },
]

party_remove = ["Магистр Эрик"]

# ── Сцена 6: Лимна, портовый квартал — перехват в переулках ───────────────────

[[scenes]]
type = "story"
lines = [
  { speaker = "Рассказчик", text = "Лимна. Узкие улицы портового квартала между складами и доходными домами. Партия идёт тихо к подвальному складу Колма — но кто-то их заметил." },
  { speaker = "Kael", text = "Слева. И сверху, на балконах. Нас ждали и здесь." },
  { speaker = "Lyra", text = "У них что-то в руках — не арбалеты. Металл и... свет?" },
  { speaker = "Aldric", text = "Разговоров не будет. К стенам — не стойте на открытом." },
]

# ── Сцена 7: Бой 3 — портовый квартал ────────────────────────────────────────

[[scenes]]
type             = "combat"
encounter        = "ch2_portside"
location         = "hills"
on_victory_flags = ["portside_cleared"]

# ── Сцена 8: После 3-го боя — искра Обруча, ниточка к складу ──────────────────

[[scenes]]
type = "story"
lines = [
  { speaker = "Lyra", text = "Это оправа из Слезы. Точно как пактовая магия в Тальмире — только без Гостя. Aldric, понимаешь, что это значит?" },
  { speaker = "Aldric", text = "Им не нужен Договор." },
  { speaker = "Lyra", text = "Им нужен только кристалл и инженер. Аскерия такого не делает — не потому что не может, а потому что не пробовала." },
  { speaker = "Kael", text = "Где склад?" },
  { speaker = "Aldric", text = "Под тремя домами вниз. По этой бумаге — сегодня ночью смена в полночь." },
  { speaker = "Lyra", text = "Тогда до полуночи. Я хочу его живым." },
]

# ── Сцена 9: Спуск на склад — Колм у прототипа ───────────────────────────────

[[scenes]]
type = "story"
lines = [
  { speaker = "Рассказчик", text = "Подвальный склад: низкие сводчатые потолки, бочки, штабеля. В центре — что-то живое в металлическом каркасе, в зачаточной форме. Колм стоит рядом, с двумя гвардейцами." },
  { speaker = "Тибор Колм", text = "Аскерия. Так далеко от башни. Давайте по-деловому: я скажу имя, вы уйдёте, и все при своём." },
  { speaker = "Lyra", text = "Имя я и так возьму. Со стола или с тебя." },
  { speaker = "Тибор Колм", text = "Жаль. Я предпочитаю сделки." },
  { speaker = "Kael", text = "А я — списки. Маркен Лесогор. Где он?" },
  { speaker = "Тибор Колм", text = "...Груз. Я не помню грузы по именам." },
]

# ── Сцена 10: Бой 4 — финал, двухфазный босс ─────────────────────────────────

[[scenes]]
type             = "combat"
encounter        = "ch2_kolm"
location         = "hills"
on_victory_flags = ["kolm_defeated"]

# ── Сцена 11: Эпилог — бумаги Колма, почерк Тэо, встреча с Касианом ───────────

[[scenes]]
type = "story"
lines = [
  { speaker = "Рассказчик", text = "В тихой верхней комнате склада. Lyra над бумагами Колма. Переписка с «Т.» и записка: «Если контейнер не выдержит — везите субъект на Остров»." },
  { speaker = "Lyra", text = "Тэо был здесь. Этот почерк — его. И этот. И этот." },
  { speaker = "Kael", text = "Какие имена в списках?" },
  { speaker = "Lyra", text = "Маркен Лесогор. Тира из Шепчущего. Дрегван из Зимней Сосны. Ещё семь. Всех — на какой-то Остров." },
  { speaker = "Kael", text = "Маркен — мой родной." },
  { speaker = "Рассказчик", text = "Через несколько дней — башня Аскерии, кабинет с тяжёлыми шторами." },
  { speaker = "Касиан", text = "Имя Тэо в документах вы видели." },
  { speaker = "Lyra", text = "Видели. Ты знал, что он там?" },
  { speaker = "Касиан", text = "Я знал, что он есть. Не знал, что именно у Колма. Возможно, нам придётся идти дальше. Я скажу — когда буду готов." },
  { speaker = "Рассказчик", text = "Lyra одна в комнате после. Лист, исписанный знакомым со студенчества наклонным почерком. Касиан не задал ни одного неудобного вопроса. И это был самый неудобный вопрос из всех." },
]
