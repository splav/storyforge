# Глава II: «След медной книги».
# id сценария = имя папки ("ch2"). Дизайн-док — ch2/docs/description.md.
#
# Линейная цепочка: пролог → бой 1 (засада/ловушки) → ... (бои 2–4 добавляются
# по мере готовности). Партия — Aldric, Lyra, Kael (все трое с начала главы).

name = "След медной книги"

# ── Стартовая партия ────────────────────────────────────────────────────────

[[party]]
name    = "Aldric"
race    = "human"
faction = "aurum"
path    = "faith"
class   = "warrior"
hex_col = 1
hex_row = 3

[[party]]
name    = "Lyra"
race    = "human"
faction = "askeria"
path    = "will"
class   = "mage"
hex_col = 0
hex_row = 4

# Kael — следопыт. Его пассивка scout_traps раскрывает ловушки в радиусе 2
# на старте хода и при движении. Спавнится впереди — разведчик авангарда.
[[party]]
name    = "Kael"
race    = "human"
faction = "aurum"
class   = "ranger"
hex_col = 1
hex_row = 2

# ── Сцена 0: Пролог ─────────────────────────────────────────────────────────

[[scenes]]
type = "story"
lines = [
  { speaker = "Рассказчик", text = "Прошло два месяца после Тальмира. Тяжёлый пергамент с печатью магистра Касиана Велла отыскал Lyra в пыльной полутьме Главного архива Аскерии." },
  { speaker = "Касиан", text = "В портовой Лимне осел некий купец. Тибор Колм. Торгует Слезами Завесы, пуская их мимо открытых рынков. Нам нужно знать конечного адресата." },
  { speaker = "Lyra", text = "Почему мы? Разве это не юрисдикция Короны?" },
  { speaker = "Касиан", text = "В Короне у Колма свои глаза и уши. А я предпочитаю узнавать новости первым. Aldric едет с тобой — его доспех отведёт лишние взгляды." },
  { speaker = "Рассказчик", text = "Раннее утро на южном тракте. Их отряд прибился к купеческому каравану, гружёному тальмирским стеклом — идеальное прикрытие для долгого пути." },
  { speaker = "Aldric", text = "Что ты доложила храму?" },
  { speaker = "Lyra", text = "Сказала, что еду в Лимну — разбираться с местными архивами. Они даже не спросили, с какими именно. Им хватает одного слова «бумаги»." },
  { speaker = "Kael", text = "Лошади нервничают. И лес затих. Для главного тракта здесь слишком мертво." },
]

# ── Сцена 1: Бой 1 — засада на тракте ────────────────────────────────────────

[[scenes]]
type             = "combat"
encounter        = "ch2_ambush"
location         = "hills"
on_victory_flags = ["ambush_cleared"]

# ── Сцена 2: После 1-го боя ──────────────────────────────────────────────────

[[scenes]]
type = "story"
lines = [
  { speaker = "Lyra", text = "Никакие это не разбойники. Взгляните на главаря: медный перстень, гильдейское клеймо из Лимны. Интересно, чьё именно." },
  { speaker = "Aldric", text = "Люди Колма?" },
  { speaker = "Lyra", text = "Вряд ли. Скорее, его конкуренты. Колм ведёт дела куда чище и не раздаёт своим цепным псам приметные побрякушки." },
  { speaker = "Kael", text = "Они сидели в засаде с самой ночи. Возница клянётся: выдвинись мы чуть раньше, легли бы здесь все. Нашим расписанием кто-то торгует." },
  { speaker = "Lyra", text = "Перстни, ловушки, слитая информация... Все ответы ждут в Лимне. Но соваться туда в лоб теперь глупо." },
  { speaker = "Kael", text = "В полумиле отсюда старое святилище. Касиан велел проведать магистра Эрика — тот изучал там Истончение. Заодно переведём дух." },
]

# ── Сцена 3: У святилища — Эрик присоединяется как защищаемый NPC ─────────────

[[scenes]]
type = "story"
lines = [
  { speaker = "Рассказчик", text = "Слепые каменные своды заброшенного святилища поросли мхом. Осыпавшийся алтарь давно превратился в труху. На почерневшем от копоти пороге лежал человек, чья мантия магистра Аскерии насквозь пропиталась кровью." },
  { speaker = "Магистр Эрик", text = "Они явились... под утро. Залётный Гость искал носителя. Взял паломника... а здесь место такое, оно их... питает. Я не удержал алтарь." },
  { speaker = "Lyra", text = "Эрик. Лежи смирно, не трать дыхание. Мы закроем проход." },
  { speaker = "Магистр Эрик", text = "Их трое. В том, что в серой накидке... там уже нет человека. Следите за тенями. И не дайте им подойти." },
]

# Эрик входит в партию неподвижным NPC: permanent stun (из шаблона
# wounded_magister), лежит у стены на стороне партии. Цель боя — сохранить его.
[[scenes.party_add]]
name     = "Магистр Эрик"
race     = "human"
path     = "faith"
hex_col  = 0
hex_row  = 5
template = "wounded_magister"

# ── Сцена 4: Бой 2 — тронутое святилище ──────────────────────────────────────

[[scenes]]
type             = "combat"
encounter        = "ch2_shrine"
location         = "hills"
on_victory_flags = ["shrine_cleared"]

# ── Сцена 5: После 2-го боя — Эрик умирает, называет имена ────────────────────

[[scenes]]
type = "story"
lines = [
  { speaker = "Lyra", text = "Магистр. Эрик, держись. Можешь говорить?" },
  { speaker = "Магистр Эрик", text = "Lyra... всё-таки успели. Этот Гость... он не от Колма, не из Мерона. Просто падальщик на Истончении. За год... я насчитал здесь шестерых. Раньше дай бог один забредал..." },
  { speaker = "Aldric", text = "У тебя были бумаги по купцу. Где они?" },
  { speaker = "Магистр Эрик", text = "Узел — в порту... Колм держит порт. Сумка... забери её. Там письма. Одно имя... ты точно узнаешь..." },
  { speaker = "Рассказчик", text = "Глаза Эрика стекленеют; дыхание со свистом обрывается. Lyra молча вытягивает из окровавленной сумки измятые бумаги. Среди накладных и цифр мелькает ровный, знакомый почерк — «Эразм Тэо». На обороте набросан список пропавших без вести людей." },
  { speaker = "Lyra", text = "Эразм Тэо. Мы вместе учились. Он покинул орден пять лет назад... Я была уверена, что он со всем завязал." },
  { speaker = "Kael", text = "Взгляни на списки. Маркен Лесогор. Это мой человек." },
  { speaker = "Aldric", text = "Значит, нам в Лимну. И быстро." },
]

party_remove = ["Магистр Эрик"]

# ── Сцена 6: Лимна, портовый квартал — перехват в переулках ───────────────────

[[scenes]]
type = "story"
lines = [
  { speaker = "Рассказчик", text = "Лимна встретила их тяжёлым запахом цветущей воды и просмолённого дерева. В узкой щели между глухими стенами складов отряд крался к подвалам Колма. Но темнота переулка внезапно ощетинилась сталью." },
  { speaker = "Kael", text = "Движение. Слева у бочек и вон там, на балконах. Нас снова ждали." },
  { speaker = "Lyra", text = "У стрелков в руках не арбалеты. Взгляните на оружие. Металл и... медовый свет?" },
  { speaker = "Aldric", text = "Значит, разговаривать не будем. К стенам, живо! Уходим с линии огня!" },
]

# ── Сцена 7: Бой 3 — портовый квартал ────────────────────────────────────────

[[scenes]]
type             = "combat"
encounter        = "ch2_portside"
location         = "hills"
on_victory_flags = ["portside_cleared"]

# ── Сцена 8: После 3-го боя — искра Обруча, ниточка к складу ──────────────────

[[scenes]]
type = "story"
lines = [
  { speaker = "Lyra", text = "Оправа с осколком Слезы... Механика почти как у пактовой магии в Тальмире, только внутри никого нет. Aldric, понимаешь, к чему всё идёт?" },
  { speaker = "Aldric", text = "Им больше не нужен Договор." },
  { speaker = "Lyra", text = "Ни Договоров, ни клятв. Только кристалл и хороший инженер. Аскерия до такого не додумалась не от недостатка знаний... мы просто не пытались загнать магию в механизм." },
  { speaker = "Kael", text = "Куда они уводят груз? Искать нужно склад." },
  { speaker = "Aldric", text = "В бумагах убитого есть план. Три дома отсюда, цокольный ярус. Смена караула сегодня в полночь." },
  { speaker = "Lyra", text = "У нас есть время до полуночи. И помните — Колм нужен мне живым. Ему есть что рассказать." },
]

# ── Сцена 9: Спуск на склад — Колм у прототипа ───────────────────────────────

[[scenes]]
type = "story"
lines = [
  { speaker = "Рассказчик", text = "Спёртый воздух подвального склада пах озоном и сукровицей. Под низкими сводами, в сплетении проводов и металлических рёбер, пульсировало что-то живое — гротескный прототип. Рядом с ним, в кольце гвардейцев, невозмутимо стоял купец Тибор Колм." },
  { speaker = "Тибор Колм", text = "Аскерия. И так далеко от родной башни. Давайте обойдёмся без театра: я продам вам имя, вы заберёте его и уйдёте. Все останутся в выигрыше." },
  { speaker = "Lyra", text = "Имя я заберу в любом случае. Либо из твоей конторской книги, либо вытрясу из тебя лично." },
  { speaker = "Тибор Колм", text = "Жаль. Я всегда предпочитал взаимовыгодные сделки." },
  { speaker = "Kael", text = "А я предпочитаю знать, куда деваются люди. Маркен Лесогор. Где он?" },
  { speaker = "Тибор Колм", text = "Живой товар. Извините, я не заучиваю имена каждой единицы груза." },
]

# ── Сцена 10: Бой 4 — финал, двухфазный босс ─────────────────────────────────

[[scenes]]
type             = "combat"
encounter        = "ch2_kolm"
location         = "hills"
on_victory_flags = ["kolm_defeated"]

# ── Сцена 11: Эпилог — бумаги Колма, почерк Тэо, встреча с Касианом ───────────

[[scenes]]
type = "story"
lines = [
  { speaker = "Рассказчик", text = "Ночь укутала Лимну. Тишина конторской комнаты на верхнем ярусе нарушалась лишь шелестом бумаг: Lyra вскрывала архив Колма. На столе лежала переписка, подписанная инициалом «Т.», и короткий приказ: «Если контейнер не выдержит резонанса — немедленно везите субъект на Остров»." },
  { speaker = "Lyra", text = "Тэо был здесь. Этот наклон букв... несомненно его почерк. Весь этот стол им исписан." },
  { speaker = "Kael", text = "Что в торговых книгах? Имена там есть?" },
  { speaker = "Lyra", text = "Маркен Лесогор. Тира, родом из Шепчущего. Дрегван из Зимней Сосны. И ещё семеро в этой партии. Судя по накладным, их всех переправили на какой-то «Остров»." },
  { speaker = "Kael", text = "Маркен. Это моя кровь." },
  { speaker = "Рассказчик", text = "...Несколько дней спустя. Главная башня Аскерии. В кабинете с задёрнутыми тяжёлыми шторами царил вечный полумрак." },
  { speaker = "Касиан", text = "Полагаю, имя Тэо в накладных вы видели." },
  { speaker = "Lyra", text = "Видели. И ты знал, что он тоже выйдет на Колма?" },
  { speaker = "Касиан", text = "Я знал, что он в игре. Но не подозревал, что его нужно искать именно у Колма. Вероятно, нам придётся пустить этот след глубже. Я дам приказ... когда буду готов." },
  { speaker = "Рассказчик", text = "Позже, оставшись одна в гулкой тишине своих покоев, Lyra долго смотрела на лист с заученным со студенчества наклонным почерком. За весь доклад Касиан не задал ей ни одного уточняющего вопроса. И эта гладкая, безупречная информированность магистра пугала больше всего остального." },
]
