# Кампейн-шаблоны для «Колокола под Завесой».
# Перекрывают/дополняют глобальные. Scenario-level `ch1/unit_templates.toml`
# побеждает эти на конфликте id (здесь конфликтов нет).

# ── Морок для призыва Узлом чащи ─────────────────────────────────────────────
# Слабенький: быстрый, мало HP, бьёт вблизи. AI-роль bruiser.
[[unit_templates]]
id    = "forest_morok"
name  = "Морок"
race  = "fey"
speed = 5

stats     = { max_hp = 5, strength = 4, dexterity = 5, constitution = -4, intelligence = 0, wisdom = 0, charisma = -2 }
equipment = { main_hand = "dagger", chest = "mage_robe", legs = "cloth_pants", feet = "cloth_shoes" }

ability_ids = ["melee_attack"]

# ── Шаблон Эха Гостя — подменяет Мерона при смерти (phase 2 в крипте) ───────
# Сильнее базового настоятеля, магический, игнорирует броню "шёпотом".
[[unit_templates]]
id    = "echo_guest"
name  = "Эхо Гостя"
race  = "aberration"
path  = "pact"
speed = 3

stats     = { max_hp = 28, strength = 2, dexterity = 0, constitution = 6, intelligence = 6, wisdom = 2, charisma = -4 }
equipment = { main_hand = "staff", chest = "mage_robe", legs = "cloth_pants", feet = "cloth_shoes" }
resources = { mana = 10 }

ability_ids = ["melee_attack", "whisper_from_beyond", "thunderstrike"]

# ── Шаблоны для главы II ──────────────────────────────────────────────────────

# Раненый магистр — не-действующий NPC (NonActingNpc).
# Нет способностей наступательных — только выживание.
[[unit_templates]]
id    = "wounded_magister"
name  = "Магистр"
race  = "human"
path  = "faith"
speed = 0

stats     = { max_hp = 6, strength = 0, dexterity = 0, constitution = 2, intelligence = 4, wisdom = 4, charisma = 2 }
equipment = { main_hand = "staff", chest = "mage_robe", legs = "cloth_pants", feet = "cloth_shoes" }

ability_ids = []

# Культистский солдат — рядовой враг для ch2.
[[unit_templates]]
id    = "cultist_grunt"
name  = "Культист"
race  = "human"
path  = "pact"
speed = 4

stats     = { max_hp = 10, strength = 4, dexterity = 2, constitution = 2, intelligence = -2, wisdom = -2, charisma = -4 }
equipment = { main_hand = "short_sword", chest = "leather_vest", legs = "leather_pants", feet = "leather_boots" }

ability_ids = ["melee_attack"]

# ── Шаблоны для бой 3 (Портовый квартал) ─────────────────────────────────────

# Бандитский лучник — дальнобойный враг с bow_shot, требующим LOS.
[[unit_templates]]
id    = "bandit_archer"
name  = "Бандитский лучник"
race  = "human"
speed = 4

stats     = { max_hp = 10, strength = 2, dexterity = 5, constitution = 0, intelligence = -2, wisdom = 0, charisma = -2 }
equipment = { main_hand = "dagger", chest = "leather_vest", legs = "leather_pants", feet = "leather_boots" }

ability_ids = ["melee_attack", "bow_shot"]

# Бандитский головорез — ближний боец, поддержка лучника.
[[unit_templates]]
id    = "bandit_thug"
name  = "Бандитский головорез"
race  = "human"
speed = 4

stats     = { max_hp = 12, strength = 5, dexterity = 2, constitution = 2, intelligence = -2, wisdom = -2, charisma = -4 }
equipment = { main_hand = "short_sword", chest = "leather_vest", legs = "leather_pants", feet = "leather_boots" }

ability_ids = ["melee_attack"]
