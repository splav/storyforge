# Scenario-local character pool. Тот же формат, что и campaign-level
# unit_templates.toml. Резолвится в порядке: scenario chars → campaign templates;
# scenario wins при коллизии id.

[[unit_templates]]
id    = "morok"
name  = "Морок"
race  = "human"                 # до добавления «fey» расы — демонстративная заглушка
speed = 3

stats     = { max_hp = 6, strength = 3, dexterity = 4, constitution = -2, intelligence = 0, wisdom = 0, charisma = -2 }
equipment = { main_hand = "short_sword", chest = "mage_robe", legs = "cloth_pants", feet = "cloth_shoes" }

ability_ids = ["melee_attack"]
