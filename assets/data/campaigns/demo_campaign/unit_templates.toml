# Глобальные шаблоны юнитов.
#
# Формат: id + полный стат-блок без позиции. Используется в:
#  * encounters.toml — enemy может ссылаться через `template = "id"` и переопределять
#    отдельные скалярные поля или целиком блоки stats/equipment/resources.
#  * phase-переходах — указать template, чтобы не переписывать все статы фазы.
#  * (позже) способностях summon для мгновенного призыва.

[[unit_templates]]
id    = "stormborn_echo"
name  = "Бурешаман"
race  = "stormborn"
path  = "heritage"
speed = 3

stats     = { max_hp = 30, strength = 4, dexterity = -2, constitution = 8, intelligence = 6, wisdom = 6, charisma = 0 }
equipment = { main_hand = "staff", chest = "chainmail", legs = "plate_greaves", feet = "iron_boots" }
resources = { mana = 8 }

ability_ids = ["melee_attack", "thunderstrike", "heal"]

# Раненый разведчик — временный союзник партии (party_add + initial_statuses).
# Присоединяется в первом story-сцене, на бой 1 лежит без сознания
# (permanent stunned), исчезает через party_remove после боя.
# Цель боя 1 — убить зверокровов и сохранить разведчика живым.
[[unit_templates]]
id      = "wounded_scout"
name    = "Раненый разведчик"
race    = "human"
faction = "aurum"
speed   = 0

stats     = { max_hp = 6, strength = 2, dexterity = 0, constitution = 2, intelligence = 0, wisdom = 0, charisma = 0 }
equipment = { main_hand = "short_sword", chest = "leather_vest", legs = "leather_pants", feet = "leather_boots" }

ability_ids      = []
initial_statuses = ["stunned"]

# Слабый мелкий призывной юнит. Шаблон используется способностью `summon_storm_spirit`.
[[unit_templates]]
id    = "storm_spirit"
name  = "Дух бури"
race  = "stormborn"
speed = 4

stats     = { max_hp = 6, strength = 3, dexterity = 4, constitution = -2, intelligence = 0, wisdom = 0, charisma = -2 }
equipment = { main_hand = "short_sword", chest = "mage_robe", legs = "cloth_pants", feet = "cloth_shoes" }

ability_ids = ["melee_attack"]
