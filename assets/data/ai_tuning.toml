# AiTuning — central tuning data for AI scoring.
# Populated incrementally across steps 2.2–2.6 (see docs/ai_rework_plan.md).

[thresholds]
survival_floor = 0.25
low_hp_factor = 1.2
aoo_penalty_k = 2.0
aoo_risk_floor = 0.25
self_survival_epsilon = 0.15
mild_penalty = -0.3
stickiness_bonus = 0.25
target_stickiness_bonus = 0.15
max_committed_turns = 3

[tables]
# Per-axis weights for the 10 utility factors.
# Rows: [Tank, Melee, Ranged, Control, Support].
# Cols: [damage, kill_now, kill_promised, cc, heal, intent, scarcity, tempo_gain, saturation, self_survival].
axis_factor_weights = [
    [0.4, 0.6, 0.3,  0.5, 0.2, 1.0, 0.4, 0.8, 1.0, 1.0],
    [1.3, 1.6, 0.8,  0.2, 0.0, 1.0, 0.3, 1.0, 1.0, 0.8],
    [1.3, 1.3, 0.65, 0.3, 0.0, 1.0, 0.5, 1.2, 1.0, 0.8],
    [0.4, 0.5, 0.4,  1.6, 0.0, 1.0, 1.2, 1.0, 1.0, 0.8],
    [0.2, 0.3, 0.15, 0.6, 2.0, 1.0, 0.8, 0.8, 1.0, 1.2],
]
# Per-axis weights for the 3 influence maps used in position evaluation.
# Rows: [Tank, Melee, Ranged, Control, Support].
# Cols: [danger, ally_support, opportunity].
axis_position_weights = [
    [-1.0, 0.7, 0.9],
    [-0.9, 0.4, 1.5],
    [-1.8, 0.7, 1.0],
    [-1.5, 0.8, 0.8],
    [-2.5, 1.3, 0.5],
]

[difficulty]
# Lerp-curve endpoints for DifficultyProfile derived values.
# Each curve: value = lo + (hi - lo) * clamp(t, 0, 1)
# lo = value at t=0 (low instinct/awareness), hi = value at t=1 (max instinct/awareness).

# Minimum pos_eval improvement to keep a Reposition candidate. Keyed on survival_instinct.
reposition_min_improvement_curve = { lo = 0.30, hi = 0.12 }
# HP% threshold for the hard-override panic gate. Keyed on survival_instinct.
survival_hp_curve                 = { lo = 0.35, hi = 0.20 }
# Danger threshold paired with the panic gate. Keyed on awareness.
awareness_danger_curve            = { lo = 0.90, hi = 0.60 }
