    [1.3, 1.56, 0.78, 0.3,  0.0, 1.0, 0.5,  1.38, 1.0, 0.56],  # Ranged
    [0.4, 0.60, 0.48, 1.6,  0.0, 1.0, 1.2,  1.15, 1.0, 0.56],  # Control
    [0.2, 0.36, 0.18, 0.6,  2.0, 1.0, 0.8,  0.92, 1.0, 0.84],  # Support
]

