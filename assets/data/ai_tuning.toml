# AiTuning — central tuning data for AI scoring.
# Populated incrementally across steps 2.2–2.6 (see docs/ai_rework_plan.md).

[thresholds]
survival_floor = 0.25
low_hp_factor = 1.2
aoo_penalty_k = 2.0
aoo_risk_floor = 0.25
self_survival_epsilon = 0.15
mild_penalty = -0.3
stickiness_bonus = 0.25
target_stickiness_bonus = 0.15
max_committed_turns = 3
# Below this hp_pct an actor is in the "low-HP zone" for AiMemory.turns_in_low_hp tracking.
low_hp_zone_threshold = 0.4
# Step 3.2 consumers: self_preserve gates for select_intent.
# Panic override: self_preserve >= this AND danger > awareness_danger_threshold → force ProtectSelf.
# Calibrated so hp≈0.20 + no recent damage ≈ 0.85 on the logistic curve (maps old hp-gate).
panic_self_preserve_threshold = 0.85
# Soft ProtectSelf gate: self_preserve > this AND danger > 0 → consider ProtectSelf.
# Calibrated to activate roughly where old hp_pct < 0.4 gate activated.
soft_self_preserve_threshold = 0.2
# Step 3.4 consumer: floor for Reposition intent.
# Below this need_signals.reposition magnitude select_intent doesn't consider Reposition.
reposition_signal_floor = 0.1
# Step 3.5 consumer: conserve_resource bonus to cheap intents.
# Above threshold, ProtectSelf and Reposition get score += conserve_resource_bonus * signal.
conserve_resource_threshold = 0.5
conserve_resource_bonus = 0.15
# Step 6.1: goal-preserving repair thresholds.
# repair_region_radius — hex distance within which a fresh plan's final_pos is
#   considered "on-goal" relative to the stored goal's region_anchor.
# repair_default_ttl — rounds before a stored goal expires via TTL decay.
# goal_finish_p_kill — p_kill_now threshold: FocusTarget is Finish when
#   p_kill_now >= this, otherwise Pressure (unless target hp_pct < 0.30).
repair_region_radius = 2
repair_default_ttl = 2
goal_finish_p_kill = 0.6
# Step 6.3: additive bonus scale applied to repair_affinity.aggregate() in finalize_scores.
# Typical full match (goal+region+method, Cosmetic) with continue_commitment=0.6:
#   bonus ≈ 0.4 * 1.6 = 0.64 — ~10-25% of a typical factor_sum (1-3).
# Calibrated via golden per-entry diff review; starting value 0.4.
repair_bonus_scale = 0.4

[tables]
# Per-axis weights for the 10 utility factors.
# Rows: [Tank, Melee, Ranged, Control, Support].
# Cols: [damage, kill_now, kill_promised, cc, heal, intent, scarcity, tempo_gain, saturation, self_survival].
axis_factor_weights = [
    [0.4, 0.6, 0.3,  0.5, 0.2, 1.0, 0.4, 0.8, 1.0, 1.0],
    [1.3, 1.6, 0.8,  0.2, 0.0, 1.0, 0.3, 1.0, 1.0, 0.8],
    [1.3, 1.3, 0.65, 0.3, 0.0, 1.0, 0.5, 1.2, 1.0, 0.8],
    [0.4, 0.5, 0.4,  1.6, 0.0, 1.0, 1.2, 1.0, 1.0, 0.8],
    [0.2, 0.3, 0.15, 0.6, 2.0, 1.0, 0.8, 0.8, 1.0, 1.2],
]
# Per-axis weights for the 3 influence maps used in position evaluation.
# Rows: [Tank, Melee, Ranged, Control, Support].
# Cols: [danger, ally_support, opportunity].
axis_position_weights = [
    [-1.0, 0.7, 0.9],
    [-0.9, 0.4, 1.5],
    [-1.8, 0.7, 1.0],
    [-1.5, 0.8, 0.8],
    [-2.5, 1.3, 0.5],
]
# Step 5.4 calibration: terminal-state axis weights per role.
# Negative axes (exposure_at_end, next_turn_lethality) get negative weights
# (penalty when terminal pos is dangerous). Positive axes get positive
# weights. Magnitudes calibrated so terminal contribution ≈ 10-20% of
# typical factor_sum (~1-3). Tunable per role: Tank tolerates exposure,
# Ranged punishes it; Support prioritizes ally_rescue; Control AoE-density.
#
# Rows: [Tank, Melee, Ranged, Control, Support].
# Cols: [exposure_at_end, next_turn_lethality, secure_kill, ally_rescue,
#        board_control_gain, line_actionability, density_value, pressure_spacing_zone].
axis_terminal_weights = [
    [-0.04, -0.06, 0.05, 0.07, 0.0, 0.0, 0.0, 0.0],  # Tank
    [-0.06, -0.07, 0.08, 0.03, 0.0, 0.0, 0.0, 0.0],  # Melee
    [-0.08, -0.09, 0.06, 0.03, 0.0, 0.0, 0.0, 0.0],  # Ranged
    [-0.05, -0.06, 0.05, 0.03, 0.0, 0.0, 0.0, 0.0],  # Control
    [-0.09, -0.09, 0.03, 0.13, 0.0, 0.0, 0.0, 0.0],  # Support
]
# Step 6.2: repair-affinity axis weights per role.
# Rows: [Tank, Melee, Ranged, Control, Support].
# Cols: [goal_w, region_w, method_w].
# goal_w: weight on goal_kind+target alignment.
# region_w: weight on final-pos proximity to stored region_anchor.
# method_w: weight on ability match (method_preserved).
axis_repair_weights = [
    [0.5, 0.3, 0.2],  # Tank
    [0.6, 0.2, 0.2],  # Melee
    [0.5, 0.3, 0.2],  # Ranged
    [0.4, 0.3, 0.3],  # Control — method matters more for setup
    [0.7, 0.2, 0.1],  # Support — goal_alignment is nearly everything
]

