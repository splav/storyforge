[difficulty]
# Lerp-curve endpoints for DifficultyProfile derived values.
# Each curve: value = lo + (hi - lo) * clamp(t, 0, 1)
# lo = value at t=0 (low instinct/awareness), hi = value at t=1 (max instinct/awareness).

# Minimum pos_eval improvement to keep a Reposition candidate. Keyed on survival_instinct.
reposition_min_improvement_curve = { lo = 0.30, hi = 0.12 }
# HP% threshold for the hard-override panic gate. Keyed on survival_instinct.
survival_hp_curve                 = { lo = 0.35, hi = 0.20 }
# Danger threshold paired with the panic gate. Keyed on awareness.
awareness_danger_curve            = { lo = 0.90, hi = 0.60 }

[curves]
# Response curves for need signals (step 3 appraisal layer).
# Each curve: { kind = "logistic", mid = ..., k = ... } or
#             { kind = "linear_clamped", x_lo = ..., x_hi = ... }.
# Stub parameters — will be tuned by mining metrics in step 3.6.
self_preserve_hp        = { kind = "logistic",       mid = 0.5,  k = 8.0   }
self_preserve_dmg_alpha = 0.6
continue_commitment_hp  = { kind = "logistic",       mid = 0.4,  k = 10.0  }
finish_target_kill      = { kind = "logistic",       mid = 0.6,  k = 6.0   }
reposition_pos_gain     = { kind = "linear_clamped", x_lo = 0.05, x_hi = 0.5 }
conserve_resource       = { kind = "logistic",       mid = 0.3,  k = -10.0 }
# Step 9.B — PROVISIONAL: recalibrate in step 9.C using v30 mining corpus.
rescue_ally             = { kind = "logistic",       mid = 0.4,  k = 8.0   }
# Step 9.B — PROVISIONAL: recalibrate in step 9.C using v30 mining corpus.
apply_cc                = { kind = "linear_clamped", x_lo = 2.0, x_hi = 10.0 }
