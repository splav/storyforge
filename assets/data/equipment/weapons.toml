# Награда за босса главы II (Тибор Колм). Тяжёлый одноручный тесак:
# урон выше длинного меча (2d8) + бонус к силе — апгрейд для воина.
[[weapons]]
id          = "kolm_cleaver"
name        = "Тесак Колма"
hand        = "main_hand"
dice_count  = 2
dice_sides  = 8
strength    = 1
image       = "items/kolm_cleaver.png"

# Природное оружие зверей (псы, волки, ловчие птицы): укус/когти.
# Не снаряжается игроком — задаётся в шаблонах животных как main_hand.
[[weapons]]
id          = "fangs"
name        = "Зубы"
hand        = "main_hand"
dice_count  = 1
dice_sides  = 6

# Живой ланцет — фокус-оружие виридийца-лекаря (Орен). Тонкий биоинструмент:
# слабый ближний дайс (1d4, на крайний случай) + spell_power 1, через который
# идёт скейл лечащих заклинаний (как посох мага). Урон/хил способности = дайс
# способности + модификатор INT + spell_power фокуса.
[[weapons]]
id          = "lancet"
name        = "Живой ланцет"
hand        = "main_hand"
dice_count  = 1
dice_sides  = 4
spell_power = 1
image       = "items/lancet.png"

# Искра — оружие-устройство Обруча: оправа из металла с гранёной Слезой Завесы.
# Магическая сила заложена в самом устройстве (spell_power), а не в носителе —
# поэтому им стреляет немаг (см. spark_shooter, int 0). Урон залпа = дайс
# способности spark_bolt + spell_power устройства. Слабый ближний дайс (1d4) —
# на крайний случай (рукоять/тычок).
[[weapons]]
id          = "spark_device"
name        = "Искра"
hand        = "main_hand"
dice_count  = 1
dice_sides  = 4
spell_power = 2
image       = "items/spark_device.png"

# Щиты — off-hand "оружие" без атаки: дайс 0 (атак-дайс берётся только из
# main_hand, поэтому off-hand 0d0 нигде не катается), вся ценность в +armor.
# В карточке лагеря строка "Урон" не показывается (expected 0 отфильтрован).
# image добавить после генерации иконки (items/<id>.png).
[[weapons]]
id          = "leather_shield"
name        = "Кожаный щит"
hand        = "off_hand"
dice_count  = 0
dice_sides  = 0
armor       = 1
image       = "items/leather_shield.png"

