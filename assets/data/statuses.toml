[[statuses]]
id          = "defending"
name        = "Защита"
armor_bonus = 4
buff_class  = "armor_buff"

[[statuses]]
id               = "taunted"
name             = "Провокация"
forces_targeting = true

[[statuses]]
id          = "stunned"
name        = "Оглушён"
skips_turn  = true

[[statuses]]
id          = "burning"
name        = "Ожог"
# Горение наносит свой огонь поверх защиты (DoT), а не «снижает броню» — поэтому
# не зависит от брони/пробития. 1 ед./тик; длительность из способности `burn` (3 хода).
dot_count   = 1
dot_sides   = 1

[[statuses]]
id          = "paralyzed"
name        = "Паралич"
skips_turn  = true

[[statuses]]
id          = "poisoned"
name        = "Отравлен"
dot_count   = 1
dot_sides   = 4

[[statuses]]
id                    = "broken_faith"
name                  = "Сломленная вера"
blocks_mana_abilities = true

[[statuses]]
id             = "exhaustion"
name           = "Истощение"
speed_bonus    = -1
hp_percent_dot = 5

[[statuses]]
id             = "pact_control"
name           = "Власть договора"
ai_controlled  = true

[[statuses]]
id                  = "disoriented"
name                = "Дезориентация"
# Все броски кубика носителя — с disadvantage (бросок дважды, худший).
# Не влияет на скорость и не блокирует действия; только смещает исход атак/заклинаний в худшую сторону.
causes_disadvantage = true

[[statuses]]
id          = "prototype_ward"
name        = "Поле прототипа"
# Аура био-прототипа Обруча: пока он жив, охрана в радиусе получает +армор.
# Движок не поддерживает бафф «к атаке», поэтому усиление охраны выражено защитой
# (живучесть). Снять прототип → аура перестаёт обновляться и спадает → охрана мягче.
armor_bonus = 2
buff_class  = "armor_buff"

[[statuses]]
id          = "injured"
name        = "Ранен"
# Persistent penalty applied between combats (e.g. carried wounds from ch2 → ch3).
# Mirrors exhaustion/defending in field layout: armor_bonus + speed_bonus only.
armor_bonus = -1
speed_bonus = -1

[[statuses]]
id            = "vital_infusion"
name          = "Вливание жизни"
# Heal-over-time: restores 4 HP per tick over the caster's turns.
# 2 rounds → +8 HP total.
heal_per_tick = 4

# ── ch3 «Остров швов» ────────────────────────────────────────────────────────

[[statuses]]
id          = "living_carapace"
name        = "Живой панцирь"
# Орен наращивает на союзнике слой живой брони — +2 к броне на 2 хода.
armor_bonus = 2
buff_class  = "armor_buff"

[[statuses]]
id          = "accumulator_field"
name        = "Поле накопителя"
# Баф-аура накопителя на Контейнер: живая батарея питает оболочку → +броня.
# Выбить накопитель → аура спадает → босс уязвимее. В фазе 3 Контейнер теряет
# тег symbiote → аура его не видит (питание отрезано) — лор-native обрыв.
armor_bonus = 3
buff_class  = "armor_buff"

[[statuses]]
id          = "numbness"
name        = "Оцепенение"
# Орен сковывает врага — −2 к скорости на 2 хода (контроль темпа, не урон).
speed_bonus = -2
