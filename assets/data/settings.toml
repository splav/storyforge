[difficulty]
# Сложность AI: "easy", "normal", "hard", "epic"
ai = "hard"
# Кость критического провала (число граней). Крит. провал = выпало 1.
crit_fail_die = 20

[debug]
# Включает сбор AI-отладки (консольный лог + influence maps). Overlay по тильде (~).
ai_debug = true
# Включает структурный JSONL-лог решений AI в папку logs/.
# Одна битва = один файл с именем YYYYMMDDThhmmss_<кампания>_<сценарий>_<энкаунтер>.jsonl.
ai_log = true
# Dev-only (cargo dev feature): id сценария-главы, с которой начинается НОВАЯ кампания.
# Пустая строка = обычный старт (первая глава). Игнорируется в релизной сборке.
start_scenario = ""
# Dev-only: прыгнуть на бой по id энкаунтера, напр. "bell_crypt"; "" = начало главы.
start_scene = ""
